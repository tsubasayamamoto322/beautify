name: CI

on:
  pull_request:
    branches: [main]

jobs:
  # ── TypeScript 型チェック ────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Amplify and Lambda function dependencies
        run: |
          npm install --prefix amplify
          npm ci --prefix amplify/functions/dailyPushNotification
          npm ci --prefix amplify/functions/sendEmail

      # Nuxt の型定義ファイル (.nuxt/) を生成
      - name: Generate Nuxt types
        run: npx nuxt prepare
        env:
          VITE_VAPID_PUBLIC_KEY: dummy

      - name: Type check
        run: npx nuxt typecheck
        env:
          VITE_VAPID_PUBLIC_KEY: dummy

  # ── ビルド検証 ────────────────────────────────────────────────────
  build:
    name: Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # nuxt generate → .output/public
      - name: Build static site
        run: npm run generate
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      # ビルド成果物を 1 日保持（デバッグ用）
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: .output/public
          retention-days: 1
