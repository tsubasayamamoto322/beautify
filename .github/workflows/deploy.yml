name: Deploy

on:
  push:
    branches: [main]

# 同時デプロイを防ぐ（先行ジョブをキャンセル）
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Backend & Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # amplify/ と各 Lambda 関数の依存パッケージをインストール
      # ampx は amplify/tsconfig.json でTypeScript検証するため amplify/node_modules が必要
      - name: Install Amplify and Lambda function dependencies
        run: |
          npm install --prefix amplify
          npm ci --prefix amplify/functions/dailyPushNotification
          npm ci --prefix amplify/functions/sendEmail

      # ── AWS 認証 ──────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Amplify Gen 2 バックエンドデプロイ ───────────────────────
      # amplify_outputs.json をローカルで更新してからフロントをビルドする
      - name: Deploy Amplify backend
        run: npx ampx pipeline-deploy --branch ${{ github.ref_name }} --app-id ${{ secrets.AMPLIFY_APP_ID }}

      # ── フロントデプロイについて ─────────────────────────────────
      # Amplify Hosting が GitHub リポジトリと接続済みのため、
      # main への push 時に Amplify Hosting が自動でビルド・デプロイする。
      # GitHub Actions 側での手動デプロイは不要。
