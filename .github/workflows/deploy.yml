name: Deploy

on:
  push:
    branches: [main]

# 同時デプロイを防ぐ（先行ジョブをキャンセル）
concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Backend & Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Lambda 関数の依存パッケージも個別にインストール
      - name: Install Lambda function dependencies
        run: |
          npm ci --prefix amplify/functions/dailyPushNotification
          npm ci --prefix amplify/functions/sendEmail

      # ── AWS 認証 ──────────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Amplify Gen 2 バックエンドデプロイ ───────────────────────
      # amplify_outputs.json をローカルで更新してからフロントをビルドする
      - name: Deploy Amplify backend
        run: npx ampx pipeline-deploy --branch ${{ github.ref_name }} --app-id ${{ secrets.AMPLIFY_APP_ID }}

      # ── Nuxt 静的サイトビルド ────────────────────────────────────
      # バックエンドデプロイ後の amplify_outputs.json を使用
      - name: Build static site
        run: npm run generate
        env:
          VITE_VAPID_PUBLIC_KEY: ${{ secrets.VITE_VAPID_PUBLIC_KEY }}

      # ── Amplify Hosting へフロントデプロイ ──────────────────────
      # create-deployment → zip アップロード → start-deployment の順
      - name: Deploy frontend to Amplify Hosting
        run: |
          # .output/public を zip 化
          cd .output/public
          zip -r ../../deploy.zip .
          cd ../..

          # デプロイジョブを作成（presigned URL を取得）
          RESPONSE=$(aws amplify create-deployment \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name "${{ github.ref_name }}")

          JOB_ID=$(echo "$RESPONSE" | jq -r '.jobId')
          UPLOAD_URL=$(echo "$RESPONSE" | jq -r '.zipUploadUrl')

          echo "Uploading build artifact (job: $JOB_ID)..."
          curl --silent --fail -T deploy.zip "$UPLOAD_URL"

          # デプロイ開始
          aws amplify start-deployment \
            --app-id "${{ secrets.AMPLIFY_APP_ID }}" \
            --branch-name "${{ github.ref_name }}" \
            --job-id "$JOB_ID"

          echo "✅ Deployment started: $JOB_ID"
